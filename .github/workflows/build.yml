name: Build QuickQuill

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Convert icon to .icns
        run: |
          mkdir -p assets/icons.iconset
          sips -z 16 16     assets/icon.png --out assets/icons.iconset/icon_16x16.png
          sips -z 32 32     assets/icon.png --out assets/icons.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon.png --out assets/icons.iconset/icon_32x32.png
          sips -z 64 64     assets/icon.png --out assets/icons.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon.png --out assets/icons.iconset/icon_128x128.png
          sips -z 256 256   assets/icon.png --out assets/icons.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon.png --out assets/icons.iconset/icon_256x256.png
          sips -z 512 512   assets/icon.png --out assets/icons.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon.png --out assets/icons.iconset/icon_512x512.png
          cp assets/icon.png assets/icons.iconset/icon_512x512@2x.png
          iconutil -c icns assets/icons.iconset -o assets/icon.icns
          echo "Icon converted to .icns"

      - name: Build .app (universal)
        run: npx electron-builder --mac dir --x64 --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Zip the .app
        run: |
          cd dist
          zip -r ../QuickQuill-mac-arm64.zip mac-arm64/QuickQuill.app 2>/dev/null || true
          zip -r ../QuickQuill-mac-x64.zip mac/QuickQuill.app 2>/dev/null || true
          ls -lh ../*.zip

      - name: Upload arm64 build
        uses: actions/upload-artifact@v4
        with:
          name: QuickQuill-mac-arm64
          path: QuickQuill-mac-arm64.zip
          if-no-files-found: warn

      - name: Upload x64 build
        uses: actions/upload-artifact@v4
        with:
          name: QuickQuill-mac-x64
          path: QuickQuill-mac-x64.zip
          if-no-files-found: warn
